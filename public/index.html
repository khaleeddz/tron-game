<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>لعبة الأثر - 4 لاعبين</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- شاشة البداية -->
<div id="screen-home" class="screen active">
  <div class="card">
    <h1>🎮 لعبة الأثر</h1>
    <p class="sub">حارب 3 أصدقاء آخرين واستحوذ على أكبر مساحة من اللوحة!</p>
    <input id="name-input" type="text" placeholder="اكتب اسمك" maxlength="16">
    <button id="btn-create" class="btn primary">إنشاء غرفة جديدة</button>
    <div class="divider">أو</div>
    <input id="code-input" type="text" placeholder="أدخل كود الغرفة" maxlength="5" style="text-transform:uppercase">
    <button id="btn-join" class="btn secondary">انضمام إلى غرفة</button>
    <p id="home-error" class="error"></p>
  </div>
</div>

<!-- غرفة الانتظار -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <h2>غرفة الانتظار</h2>
    <p>شارك هذا الرابط أو الكود مع أصدقائك:</p>
    <div class="room-code-box">
      <span id="room-code-display">------</span>
      <button id="btn-copy" class="btn tiny">نسخ الرابط</button>
    </div>
    <div id="players-list" class="players-list"></div>
    <button id="btn-start" class="btn primary">بدء اللعبة</button>
    <p class="hint">يلزم لاعبان على الأقل (بحد أقصى 4). المضيف فقط يبدأ اللعبة.</p>
    <p id="lobby-error" class="error"></p>
  </div>
</div>

<!-- شاشة اللعب -->
<div id="screen-game" class="screen">
  <div id="score-bar"></div>
  <div id="board-wrap">
    <canvas id="board"></canvas>
  </div>
  <div id="dpad">
    <button data-dir="up" class="dpad-btn up">▲</button>
    <div class="dpad-row">
      <button data-dir="left" class="dpad-btn left">◀</button>
      <button data-dir="right" class="dpad-btn right">▶</button>
    </div>
    <button data-dir="down" class="dpad-btn down">▼</button>
  </div>
</div>

<!-- شاشة النهاية -->
<div id="screen-over" class="screen">
  <div class="card">
    <h2 id="over-title">انتهت اللعبة</h2>
    <div id="over-results"></div>
    <button id="btn-again" class="btn primary">إعادة اللعب</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
